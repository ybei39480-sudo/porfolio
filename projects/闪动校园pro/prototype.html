<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>闪动校园Pro - 体验优化原型</title>
<style>
  :root {
    --green: #34C759;
    --green-bg: #e8f8ed;
    --yellow: #FF9500;
    --yellow-bg: #fff6e8;
    --red: #FF3B30;
    --red-bg: #ffebea;
    --blue: #007AFF;
    --bg: #f2f2f2;
    --card: #ffffff;
    --text: #1c1c1e;
    --text2: #8e8e93;
    --border: #e5e5ea;
    --shadow: 0 1px 4px rgba(0,0,0,.08);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #d8d8d8; color: var(--text);
    max-width: 390px; margin: 20px auto;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    background: #000;
    box-shadow: 0 6px 30px rgba(0,0,0,.2);
    overflow: hidden;
    position: relative;
    min-height: 700px;
  }

  /* status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 20px 4px;
    font-size: 11px; font-weight: 600; color: #fff;
    background: #000;
  }

  /* nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: #000;
  }
  .nav-back { color: var(--blue); font-size: 15px; cursor: pointer; }
  .nav-title { color: #fff; font-size: 16px; font-weight: 600; }
  .nav-action { color: var(--blue); font-size: 14px; cursor: pointer; }

  /* scenario tabs */
  .scenario-tabs {
    display: flex; background: #1c1c1e; gap: 0; padding: 6px 12px;
  }
  .scenario-tab {
    flex: 1; text-align: center; padding: 8px 4px; font-size: 12px;
    color: var(--text2); cursor: pointer; border-radius: 8px;
    transition: all .2s;
  }
  .scenario-tab.active {
    background: #2c2c2e; color: #fff; font-weight: 500;
  }

  /* main running area */
  .run-area {
    background: #000; min-height: 520px; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* status indicator */
  .status-indicator {
    width: 100%; padding: 16px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; transition: all .4s ease;
  }
  .status-indicator.green { background: rgba(52,199,89,.15); border: 1px solid rgba(52,199,89,.3); }
  .status-indicator.yellow { background: rgba(255,149,0,.15); border: 1px solid rgba(255,149,0,.3); }
  .status-indicator.red { background: rgba(255,59,48,.15); border: 1px solid rgba(255,59,48,.3); }

  .status-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .green .status-dot { background: var(--green); color: var(--green); }
  .yellow .status-dot { background: var(--yellow); color: var(--yellow); }
  .red .status-dot { background: var(--red); color: var(--red); }

  .status-text { flex: 1; }
  .status-label { font-size: 15px; font-weight: 600; color: #fff; }
  .status-desc { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }

  /* run data */
  .run-data {
    display: flex; justify-content: space-around; width: 100%;
    margin-bottom: 32px;
  }
  .run-data-item { text-align: center; }
  .run-data-value { font-size: 40px; font-weight: 200; color: #fff; font-variant-numeric: tabular-nums; }
  .run-data-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .run-data-unit { font-size: 16px; font-weight: 400; color: var(--text2); }

  /* action button */
  .action-btn {
    width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--red);
    background: rgba(255,59,48,.1); color: var(--red); font-size: 16px;
    font-weight: 600; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .action-btn:hover { background: rgba(255,59,48,.2); }
  .action-btn.paused { border-color: var(--green); color: var(--green); background: rgba(52,199,89,.1); }

  /* map placeholder */
  .map-area {
    width: 100%; height: 120px; border-radius: var(--radius);
    background: #1c1c1e; margin-bottom: 16px;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .map-label { color: var(--text2); font-size: 13px; }
  .map-path {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }

  /* bottom sheet */
  .bottom-sheet {
    background: #1c1c1e; padding: 16px 20px 24px;
    border-radius: 16px 16px 0 0;
    margin-top: -8px;
  }
  .sheet-title { color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .sheet-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .sheet-label { color: var(--text2); font-size: 13px; }
  .sheet-value { color: #fff; font-size: 13px; font-weight: 500; }

  /* face verification overlay */
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.85); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .face-frame {
    width: 200px; height: 240px; border: 2px solid rgba(255,255,255,.3);
    border-radius: 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .face-frame::after {
    content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
    border: 2px solid var(--green); border-radius: 16px;
    animation: scan 2s ease-in-out infinite; opacity: .6;
  }
  @keyframes scan {
    0%, 100% { clip-path: inset(0 0 95% 0); }
    50% { clip-path: inset(95% 0 0 0); }
  }
  .face-icon { font-size: 60px; opacity: .5; }
  .face-text { color: #fff; font-size: 14px; margin-bottom: 16px; }
  .face-reason { color: var(--red); font-size: 13px; margin-bottom: 20px; background: rgba(255,59,48,.1); padding: 8px 16px; border-radius: 8px; }
  .face-btn { background: var(--green); color: #fff; border: none; padding: 12px 48px; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; }

  /* notification toast */
  .toast {
    position: absolute; top: 100px; left: 20px; right: 20px;
    background: #1c1c1e; color: #fff; padding: 14px 18px;
    border-radius: var(--radius); font-size: 13px; z-index: 20;
    opacity: 0; transform: translateY(-10px); transition: all .3s;
    text-align: center; border: 1px solid #333;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* legend for prototype */
  .prototype-legend {
    background: #1c1c1e; padding: 12px 16px; margin: 0 12px 8px;
    border-radius: 8px; font-size: 11px; color: var(--text2); line-height: 1.6;
  }
  .prototype-legend span { color: #fff; }
</style>
</head>
<body>
<div class="phone" id="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <span>闪动校园Pro</span>
    <span>🔋 85%</span>
  </div>

  <!-- Nav -->
  <div class="nav">
    <span class="nav-back">‹ 返回</span>
    <span class="nav-title">健康跑</span>
    <span class="nav-action">设置</span>
  </div>

  <!-- Scenario Tabs -->
  <div class="scenario-tabs">
    <div class="scenario-tab active" data-scenario="1">方案一：正常跑步</div>
    <div class="scenario-tab" data-scenario="2">方案二：弱网补偿</div>
    <div class="scenario-tab" data-scenario="3">模拟：触发人脸</div>
  </div>

  <!-- Running Area -->
  <div class="run-area">
    <!-- Status Indicator -->
    <div class="status-indicator green" id="statusIndicator">
      <div class="status-dot"></div>
      <div class="status-text">
        <div class="status-label" id="statusLabel">GPS 信号良好</div>
        <div class="status-desc" id="statusDesc">正常跑步，轨迹记录中</div>
      </div>
    </div>

    <!-- Run Data -->
    <div class="run-data">
      <div class="run-data-item">
        <div class="run-data-value" id="distance">1.28<span class="run-data-unit">km</span></div>
        <div class="run-data-label">距离</div>
      </div>
      <div class="run-data-item">
        <div class="run-data-value" id="pace">5<span class="run-data-unit">'32"</span></div>
        <div class="run-data-label">配速</div>
      </div>
      <div class="run-data-item">
        <div class="run-data-value" id="time">7<span class="run-data-unit">:05</span></div>
        <div class="run-data-label">用时</div>
      </div>
    </div>

    <!-- Action Button -->
    <div class="action-btn paused" id="actionBtn" onclick="toggleRun()">暂停</div>

    <!-- Map Area -->
    <div class="map-area" id="mapArea">
      <svg class="map-path" viewBox="0 0 350 120" id="mapSvg">
        <path d="M20,60 Q100,20 180,50 T340,55" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#FF9500"/>
        <circle cx="340" cy="55" r="8" fill="#34C759"/>
        <circle cx="340" cy="55" r="3" fill="#fff"/>
      </svg>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <div class="sheet-title">跑步详情</div>
    <div class="sheet-row">
      <span class="sheet-label">目标</span>
      <span class="sheet-value">2.0 公里</span>
    </div>
    <div class="sheet-row">
      <span class="sheet-label">步频</span>
      <span class="sheet-value" id="cadence">168 步/分钟</span>
    </div>
    <div class="sheet-row">
      <span class="sheet-label">GPS 精度</span>
      <span class="sheet-value" id="gpsAccuracy" style="color: #34C759">优秀 (3m)</span>
    </div>
    <div class="sheet-row">
      <span class="sheet-label">人脸识别</span>
      <span class="sheet-value" id="faceStatus" style="color: #34C759">正常跑步，无需验证</span>
    </div>
  </div>

  <!-- Face Verification Overlay -->
  <div class="overlay" id="faceOverlay">
    <div class="face-frame">
      <div class="face-icon">👤</div>
    </div>
    <div class="face-text">请将面部对准框内</div>
    <div class="face-reason" id="faceReason">⚠️ 检测到速度异常 (32km/h)，疑似骑车代跑</div>
    <div class="face-btn" onclick="verifyFace()">开始验证</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Prototype Legend -->
  <div class="prototype-legend" id="legend">
    <span>原型提示：</span>点击顶部标签切换场景演示。方案一展示正常跑步零打扰，方案二展示弱网补偿全过程，模拟展示异常触发人脸识别流程。
  </div>
</div>

<script>
  let currentScenario = 1;
  let running = true;
  let timerInterval = null;
  let elapsed = 425; // 7:05 in seconds
  let toastTimer = null;

  // Scenario switching
  document.querySelectorAll('.scenario-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentScenario = parseInt(this.dataset.scenario);
      applyScenario(currentScenario);
    });
  });

  function applyScenario(n) {
    clearTimeout(timerInterval);
    if (timerInterval) clearTimeout(timerInterval);

    const indicator = document.getElementById('statusIndicator');
    const label = document.getElementById('statusLabel');
    const desc = document.getElementById('statusDesc');
    const faceStatus = document.getElementById('faceStatus');
    const gpsAccuracy = document.getElementById('gpsAccuracy');
    const mapSvg = document.getElementById('mapSvg');
    const legend = document.getElementById('legend');
    const cadence = document.getElementById('cadence');

    // Hide face overlay
    document.getElementById('faceOverlay').classList.remove('show');

    if (n === 1) {
      // 方案一：正常跑步
      indicator.className = 'status-indicator green';
      label.textContent = 'GPS 信号良好';
      desc.textContent = '正常跑步，轨迹记录中';
      faceStatus.innerHTML = '<span style="color:#34C759">正常跑步，无需验证</span>';
      gpsAccuracy.innerHTML = '<span style="color:#34C759">优秀 (3m)</span>';
      cadence.textContent = '168 步/分钟';
      mapSvg.innerHTML = `
        <path d="M20,60 Q100,20 180,50 T340,55" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#34C759"/>
        <circle cx="340" cy="55" r="8" fill="#34C759"/>
        <circle cx="340" cy="55" r="3" fill="#fff"/>
      `;
      legend.innerHTML = '<span>方案一：</span>人脸识别从随机弹窗改为异常触发。正常跑步（配速稳定、步频正常）全程无弹窗，状态面板保持绿色。跑步体验顺畅无打断。';
      document.getElementById('actionBtn').style.display = 'flex';

    } else if (n === 2) {
      // 方案二：弱网补偿 - 分阶段演示
      runWeakNetworkDemo();
      legend.innerHTML = '<span>方案二：</span>模拟弱网环境下的定位补偿。GPS 信号丢失后自动启动加速度计缓存，状态面板变黄。短时丢失自动补全轨迹，超时标记人工审核。';
      document.getElementById('actionBtn').style.display = 'flex';

    } else if (n === 3) {
      // 方案三/模拟：触发人脸识别
      indicator.className = 'status-indicator red';
      label.textContent = '检测到异常';
      desc.textContent = '速度异常，需进行人脸验证';
      faceStatus.innerHTML = '<span style="color:#FF3B30">需要验证</span>';
      gpsAccuracy.innerHTML = '<span style="color:#FF3B30">异常 (速度 32km/h)</span>';
      cadence.textContent = '0 步/分钟';
      mapSvg.innerHTML = `
        <path d="M20,60 Q60,50 120,48 T250,40 T340,35" fill="none" stroke="rgba(255,59,48,.5)" stroke-width="3" stroke-dasharray="8,4"/>
        <circle cx="20" cy="60" r="5" fill="#FF3B30"/>
        <circle cx="250" cy="40" r="5" fill="#FF3B30"/>
        <circle cx="340" cy="35" r="8" fill="#FF3B30"/>
      `;
      legend.innerHTML = '<span>模拟：</span>系统检测到瞬时速度 32km/h（超过 25km/h 阈值），步频归零但持续移动。触发人脸识别验证，用户需自证身份后继续跑步。';
      document.getElementById('actionBtn').style.display = 'flex';

      // Show face overlay after a short delay
      setTimeout(() => {
        if (currentScenario === 3) {
          document.getElementById('faceOverlay').classList.add('show');
          document.getElementById('faceReason').textContent = '⚠️ 检测到速度异常 (32km/h)，疑似骑车代跑';
        }
      }, 800);
    }
  }

  function runWeakNetworkDemo() {
    const phases = [
      { delay: 0, indicator: 'green', label: 'GPS 信号良好', desc: '正常跑步，轨迹记录中', face: '正常跑步，无需验证', gps: '<span style="color:#34C759">优秀 (3m)</span>', cadence: '168 步/分钟', map: 'normal' },
      { delay: 2000, indicator: 'yellow', label: 'GPS 信号弱', desc: '已启动加速度计缓存补偿 (第 2 秒)', face: '补偿中，无需验证', gps: '<span style="color:#FF9500">弱 (已切换缓存模式)</span>', cadence: '165 步/分钟', map: 'weak' },
      { delay: 5000, indicator: 'green', label: 'GPS 信号恢复', desc: '轨迹已自动补全，精度正常', face: '正常跑步，无需验证', gps: '<span style="color:#34C759">良好 (5m)</span>', cadence: '167 步/分钟', map: 'restored' },
    ];

    phases.forEach(phase => {
      setTimeout(() => {
        if (currentScenario !== 2) return;
        applyWeakNetworkPhase(phase);
      }, phase.delay);
    });
  }

  function applyWeakNetworkPhase(phase) {
    const indicator = document.getElementById('statusIndicator');
    document.getElementById('statusLabel').textContent = phase.label;
    document.getElementById('statusDesc').textContent = phase.desc;
    document.getElementById('faceStatus').innerHTML = '<span style="color:' + (phase.indicator === 'green' ? '#34C759' : '#FF9500') + '">' + phase.face + '</span>';
    document.getElementById('gpsAccuracy').innerHTML = phase.gps;
    document.getElementById('cadence').textContent = phase.cadence;
    indicator.className = 'status-indicator ' + phase.indicator;

    const mapSvg = document.getElementById('mapSvg');
    if (phase.map === 'normal') {
      mapSvg.innerHTML = `
        <path d="M20,60 Q100,20 180,50 T340,55" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#34C759"/>
        <circle cx="340" cy="55" r="8" fill="#34C759"/>
      `;
    } else if (phase.map === 'weak') {
      mapSvg.innerHTML = `
        <path d="M20,60 Q100,20 180,50" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <path d="M180,50 Q260,65 340,55" fill="none" stroke="rgba(255,149,0,.5)" stroke-width="3" stroke-dasharray="6,3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#FF9500"/>
        <circle cx="340" cy="55" r="8" fill="#FF9500"/>
        <text x="260" y="40" fill="rgba(255,149,0,.7)" font-size="9">补偿中</text>
      `;
    } else if (phase.map === 'restored') {
      mapSvg.innerHTML = `
        <path d="M20,60 Q100,20 180,50 T340,55" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#34C759"/>
        <circle cx="340" cy="55" r="8" fill="#34C759"/>
        <circle cx="340" cy="55" r="3" fill="#fff"/>
        <text x="230" y="40" fill="rgba(52,199,89,.7)" font-size="9">✓ 已补全</text>
      `;
    }
  }

  // Face verification
  function verifyFace() {
    document.getElementById('faceOverlay').classList.remove('show');
    showToast('✓ 验证通过，请继续跑步');

    if (currentScenario === 3) {
      const indicator = document.getElementById('statusIndicator');
      indicator.className = 'status-indicator green';
      document.getElementById('statusLabel').textContent = 'GPS 信号良好';
      document.getElementById('statusDesc').textContent = '验证通过，恢复正常记录';
      document.getElementById('faceStatus').innerHTML = '<span style="color:#34C759">已验证通过</span>';
      document.getElementById('gpsAccuracy').innerHTML = '<span style="color:#34C759">良好 (4m)</span>';
      document.getElementById('cadence').textContent = '170 步/分钟';
      document.getElementById('mapSvg').innerHTML = `
        <path d="M20,60 Q100,20 180,50 T340,55" fill="none" stroke="rgba(52,199,89,.4)" stroke-width="3"/>
        <circle cx="20" cy="60" r="5" fill="#34C759"/>
        <circle cx="180" cy="50" r="5" fill="#34C759"/>
        <circle cx="340" cy="55" r="8" fill="#34C759"/>
        <circle cx="340" cy="55" r="3" fill="#fff"/>
      `;
    }

    setTimeout(() => {
      showToast('状态恢复正常，请放心跑步');
    }, 2500);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function toggleRun() {
    const btn = document.getElementById('actionBtn');
    running = !running;
    if (running) {
      btn.textContent = '暂停';
      btn.classList.add('paused');
    } else {
      btn.textContent = '继续';
      btn.classList.remove('paused');
    }
  }

  // Timer
  function updateTimer() {
    if (!running) return;
    elapsed++;
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('time').innerHTML = m + '<span class="run-data-unit">:' + String(s).padStart(2,'0') + '</span>';

    // Simulate distance increase
    if (elapsed % 10 === 0 && currentScenario === 1) {
      const dist = (1.28 + (elapsed - 425) * 0.003).toFixed(2);
      document.getElementById('distance').innerHTML = dist + '<span class="run-data-unit">km</span>';
    }
  }

  timerInterval = setInterval(updateTimer, 1000);

  // Don't auto-advance the weak network demo - just run it once when tab is clicked
  // The demo runs on tab switch via applyScenario
</script>
</body>
</html>
